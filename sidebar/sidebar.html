<!DOCTYPE html>
<html lang="en" data-i18n-page-title="sidebarTitle">

<head>
<meta charset="UTF-8">
<title>LinkScout - Bookmarks</title>
<link rel="stylesheet" href="sidebar.css">
</head>

<body>
<div class="sidebar-container">
<header class="sidebar-header">
<h1>🔗 LinkScout</h1>
<div class="header-actions">
<div class="search-container">
<input type="text" id="searchInput" data-i18n-placeholder="sidebarSearchPlaceholder" data-i18n-title="sidebarSearchTitle">

</div>
<button id="groupByDomainBtn" class="icon-btn" data-i18n-title="sidebarGroupByDomain">🌐</button>
<button id="sortBtn" class="icon-btn" data-i18n-title="sidebarSortOrder">⬇️</button>
<div class="divider"></div>
<button id="collapseAllBtn" class="icon-btn" data-i18n-title="sidebarCollapseAll">➖</button>
<button id="expandAllBtn" class="icon-btn" data-i18n-title="sidebarExpandAll">➕</button>
<button id="refreshBtn" class="icon-btn" data-i18n-title="sidebarRefresh">🔄</button>
</div>
</header>

<div class="sidebar-content">
<div id="loadingState" class="state-message">
<span class="spinner"></span>
<span data-i18n="sidebarLoadingBookmarks"></span>
</div>

<div id="emptyState" class="state-message" style="display: none;" data-i18n="sidebarNoBookmarks">
</div>

<div id="bookmarkTree" class="bookmark-tree"></div>
</div>

</div>

<script src="../i18n.js"></script>
<script src="sidebar.js"></script>
</body>

</html>
